[variables]
    PHP_VERSION = "8.4"
    NIXPACKS_PHP_V = "8.4"
    NODE_VERSION = "20"
    COMPOSER_IGNORE_PLATFORM_REQS = "1"

[phases.setup]
    nixPkgs = [
        "php84", 
        "php84Packages.composer", 
        "nodejs_20", 
        "git"
    ]

[phases.install]
    cmds = [
        "composer install --optimize-autoloader --no-interaction --no-scripts --ignore-platform-reqs",
        "if [ -f package.json ]; then npm install; fi"
    ]

[phases.build]
    cmds = [
        "if [ -f package.json ]; then npm run build; fi",
        "php artisan config:cache",
        "php artisan route:cache"
    ]

# This is the critical part: It tells Nixpacks to keep Node/NPM in the final image
[staticAssets]
    path = "public"

[start]
    # We ensure the path includes the nix binaries
    cmd = "php artisan serve --host 0.0.0.0 --port $PORT"