[variables]
    PHP_VERSION = "8.4"
    NIXPACKS_PHP_V = "8.4"
    NODE_VERSION = "20"
    COMPOSER_IGNORE_PLATFORM_REQS = "1"

[phases.setup]
    # We must explicitly list the PHP engine and every required extension
    nixPkgs = [
        "php84", 
        "php84Packages.composer", 
        "php84Extensions.pdo_mysql",
        "php84Extensions.mbstring",
        "php84Extensions.gd",
        "php84Extensions.xml",
        "php84Extensions.bcmath",
        "php84Extensions.ctype",
        "php84Extensions.curl",
        "nodejs_20", 
        "git"
    ]

[phases.install]
    # Installs PHP and Node dependencies
    cmds = [
        "composer install --optimize-autoloader --no-interaction --no-scripts --ignore-platform-reqs",
        "if [ -f package.json ]; then npm install; fi"
    ]

[phases.build]
    # Builds assets and caches Laravel configuration
    cmds = [
        "if [ -f package.json ]; then npm run build; fi",
        "php artisan config:cache",
        "php artisan route:cache",
        "php artisan view:cache"
    ]

[start]
    # Ensure we use the proper host/port for Railway
    cmd = "php artisan serve --host 0.0.0.0 --port $PORT"