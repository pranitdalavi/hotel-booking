[variables]
    PHP_VERSION = "8.4"
    NIXPACKS_PHP_V = "8.4"
    COMPOSER_IGNORE_PLATFORM_REQS = "1"

[phases.setup]
    nixPkgs = [
        "php84",
        "php84Packages.composer",
        "php84Extensions.pdo_mysql",
        "php84Extensions.mysqlnd",
        "php84Extensions.mbstring",
        "mysql84",
        "nodejs",
        "git"
    ]

[phases.install]
    cmds = [
        "composer install --optimize-autoloader --no-interaction --no-scripts --ignore-platform-reqs"
    ]

[phases.build]
    cmds = [
        # Build frontend assets if package.json exists
        "if [ -f package.json ]; then npm install && npm run build; fi",
        
        # Optimize Laravel configuration
        "php artisan config:cache",
        "php artisan route:cache",
        "php artisan view:cache",
        
        # Run Database Migrations and Seeders
        # --force is required for production environments
        "php artisan migrate --force",
        "php artisan db:seed --force"
    ]

[start]
    cmd = "php artisan serve --host 0.0.0.0 --port $PORT"