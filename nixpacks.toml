[variables]
    PHP_VERSION = "8.4"
    NIXPACKS_PHP_V = "8.4"
    # This ignores the platform check during the build process
    COMPOSER_IGNORE_PLATFORM_REQS = "1"

[phases.setup]
    # Explicitly tells Nixpacks to use the PHP 8.4 package
    nixPkgs = ["php84", "php84Packages.composer", "nodejs"]

[phases.install]
    # Ensures we install dependencies even if there's a minor version mismatch
    cmds = ["composer install --optimize-autoloader --no-interaction --no-scripts --ignore-platform-reqs"]

[phases.build]
    # Runs the Laravel optimization commands
    cmds = [
        "php artisan config:cache",
        "php artisan route:cache",
        "php artisan view:cache"
    ]

[start]
    cmd = "php artisan serve --host 0.0.0.0 --port $PORT"