[variables]
    PHP_VERSION = "8.4"
    NIXPACKS_PHP_V = "8.4"
    NODE_VERSION = "20"
    COMPOSER_IGNORE_PLATFORM_REQS = "1"

[phases.setup]
    # Using 'nodejs' usually defaults to the latest LTS which includes npm
    nixPkgs = [
        "php84", 
        "php84Packages.composer", 
        "nodejs", 
        "git"
    ]

[phases.install]
    # We use 'npm install' only if package.json exists to prevent errors
    cmds = [
        "composer install --optimize-autoloader --no-interaction --no-scripts --ignore-platform-reqs",
        "if [ -f package.json ]; then npm install; fi"
    ]

[phases.build]
    # We only run 'npm run build' if the script exists in package.json
    cmds = [
        "if [ -f package.json ]; then npm run build; fi",
        "php artisan config:cache",
        "php artisan route:cache",
        "php artisan view:cache"
    ]

[start]
    cmd = "php artisan serve --host 0.0.0.0 --port $PORT"