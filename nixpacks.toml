[variables]
    PHP_VERSION = "8.4"
    NIXPACKS_PHP_V = "8.4"
    NODE_VERSION = "20"
    COMPOSER_IGNORE_PLATFORM_REQS = "1"

[phases.setup]
    nixPkgs = [
        "php84", 
        "php84Packages.composer", 
        "php84Extensions.pdo_mysql",
        "php84Extensions.mbstring",
        "php84Extensions.gd",
        "php84Extensions.xml",
        "php84Extensions.bcmath",
        "nodejs", 
        "git"
    ]

[phases.install]
    cmds = [
        "composer install --optimize-autoloader --no-interaction --no-scripts --ignore-platform-reqs",
        "if [ -f package.json ]; then npm install; fi"
    ]

[phases.build]
    cmds = [
        "if [ -f package.json ]; then npm run build; fi",
        "php artisan config:cache",
        "php artisan route:cache"
        # Optional: Uncomment the line below if you want migrations to run DURING build
        # "php artisan migrate --force" 
    ]

[start]
    cmd = "php artisan serve --host 0.0.0.0 --port $PORT"