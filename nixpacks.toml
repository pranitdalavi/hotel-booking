[variables]
    PHP_VERSION = "8.4"
    NIXPACKS_PHP_V = "8.4"
    COMPOSER_IGNORE_PLATFORM_REQS = "1"
    NODE_VERSION = "20"

[phases.setup]
    # We must explicitly list nodejs and common PHP extensions here
    nixPkgs = [
        "php84", 
        "php84Packages.composer", 
        "php84Extensions.gd",
        "php84Extensions.mbstring",
        "php84Extensions.zip",
        "nodejs_20", 
        "git"
    ]

[phases.install]
    # Install both PHP and Node dependencies
    cmds = [
        "composer install --optimize-autoloader --no-interaction --no-scripts --ignore-platform-reqs",
        "npm install"
    ]

[phases.build]
    # Build your assets (Vite/Mix) and then cache Laravel config
    cmds = [
        "npm run build",
        "php artisan config:cache",
        "php artisan route:cache",
        "php artisan view:cache"
    ]

[start]
    cmd = "php artisan serve --host 0.0.0.0 --port $PORT"