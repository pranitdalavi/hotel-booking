[variables]
    PHP_VERSION = "8.4"
    NIXPACKS_PHP_V = "8.4"
    COMPOSER_IGNORE_PLATFORM_REQS = "1"

[phases.setup]
    nixPkgs = [
        "php84",
        "php84Packages.composer",
        "php84Extensions.pdo_mysql",
        "php84Extensions.mysqlnd",
        "php84Extensions.mbstring",
        "mysql84",
        "nodejs",
        "git"
    ]

[phases.install]
    cmds = ["composer install --optimize-autoloader --no-interaction --no-scripts --ignore-platform-reqs"]

[phases.build]
    cmds = [
        "if [ -f package.json ]; then npm install && npm run build; fi",
        "php artisan config:cache",
        "php artisan route:cache"
    ]

[start]
    cmd = "php artisan serve --host 0.0.0.0 --port $PORT"