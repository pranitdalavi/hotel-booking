services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotel_app
    command: sh -c "chmod -R 777 storage bootstrap/cache && apache2-foreground"
    ports:
      - "8080:80"
    depends_on:
      - db
    environment:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: hotel_booking
      DB_USERNAME: root
      DB_PASSWORD: password
    volumes:
      - .:/var/www/html
    networks:
      - hotel-network

  db:
    image: mysql:8.0
    container_name: hotel_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: hotel_booking
      MYSQL_USER: hoteluser
      MYSQL_PASSWORD: hotelpass
    networks:
      - hotel-network
    volumes:
      - db_data:/var/lib/mysql

networks:
  hotel-network:
    driver: bridge

volumes:
  db_data:
